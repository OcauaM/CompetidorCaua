<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="View/css/bootstrap.min.css">
</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col-10">

                <nav class="navbar bg-body-tertiary">
                    <div class="container-fluid">
                        <span class="navbar-brand mb-0 h1">MORTEVISUAL</span>
                    </div>
                </nav>
            </div>
            <div class="col-2 pt-3">
                <img src="user-interface.png" alt="">
            </div>
        </div>
        <div class="row">
            <div class="col--sm-12">
                <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="WhatsApp Image 2026-04-28 at 23.18.15.jpeg" class="d-block w-100" alt="..."
                                height="450">
                        </div>

                    </div>

                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-sm-4 text-center text-bg-secondary border border-2 border-black">
            <img src="2.jpeg" class="img-fluid" alt="...">
        </div>
        <div class="col-sm-4 text-center text-bg-secondary border border-2 border-black">
            <img src="3.jpeg" class="img-fluid" alt="...">
        </div>
        <div class="col-sm-4 text-center text-bg-secondary border border-2 border-black">
            <div id="carouselExampleFade" class="carousel slide carousel-fade">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="4.jpeg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="5.jpeg" class="d-block w-100" alt="...">
                    </div>

                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-sm-12 text-center text-bg-secondary border border-2 border-black">
            <div class="card">
                <div class="card-header">
                    Redes sociais
                </div>
                <div class="card-body">
                    <h5 class="card-title">Instagram</h5>
                    <p class="card-text">Nos siga para informações de novos lançamentos.</p>
                    <a href="https://www.instagram.com/mortevisual/?hl=pt-br" class="btn btn-primary">
                        clique aqui</a>
                </div>
            </div>
        </div>
    </div>
    <script src="View/js/bootstrap.min.js"></script>
</body>

</html>
